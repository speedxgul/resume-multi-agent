# Static profile — things the LLM should never change.
# Fill these in before running.
profile:
  name: ""
  email: ""
  phone: ""        # optional, leave "" to omit
  location: ""     # e.g. "Bengaluru, India"
  linkedin: ""     # full URL
  github: ""       # full URL or just username
  twitter: ""      # handle without @
  website: ""      # optional personal site

# Source handles the collectors will use.
sources:
  github_username: ""        # required for GitHub collector
  github_max_repos: 30       # cap on repos analyzed (sorted by stars + recent push)
  github_include_readmes: 5  # fetch READMEs for top N repos (richer signal for synthesizer)
  linkedin_profile_file: "inputs/linkedin_profile.txt"   # paste your LinkedIn text here
  twitter_profile_file: "inputs/twitter_profile.txt"     # paste pinned tweets / bio here
  manual_context_file: "inputs/manual_context.md"        # free-form notes; http(s) links here are auto-fetched
  urls_file: "inputs/urls.txt"                           # one URL per line (optional if links are in manual_context.md)

  # Crustdata Person Enrich — structured LinkedIn profile (optional; requires CRUSTDATA_API_KEY)
  crustdata_enabled: false
  crustdata_profile_url: ""      # optional override; defaults to profile.linkedin
  crustdata_use_email: false     # lookup by profile.email when no LinkedIn URL is set
  crustdata_use_live: false      # use live enrich endpoint (plan-gated; costs more credits)
  crustdata_min_similarity_score: 0.8  # for email lookup only
  crustdata_fields:
    - basic_profile
    - experience
    - education
    - skills
    - honors
    - social_handles

# Crustdata MCP transport (default). Set transport: rest to use direct REST API.
crustdata:
  mcp_url: "https://mcp.crustdata.com/mcp"
  transport: "mcp"   # mcp | rest

# Target roles for job-search tailoring (Crustdata MCP job_search).
target:
  enabled: false
  titles: ["Backend Engineer", "Software Engineer"]
  category: ""              # optional, e.g. "Engineering"
  workplace_type: ""        # optional: Remote, Hybrid, On-site
  location_country: ""        # optional, e.g. "India"
  industries: []              # optional
  company_domains: []         # optional
  max_jobs: 15

# Models — tweak via env vars (see .env.example) if needed.
models:
  synthesizer: "claude-opus-4-7"          # strong reasoning for the merge step
  extractor:   "claude-sonnet-4-5"         # section feedback revisions during review
  max_tokens: 13000                         # synthesizer output cap
  revise_max_tokens: 4096                  # per-section feedback revision cap

# LaTeX output preferences.
output:
  resume_basename: "resume"   # outputs/resume.tex + outputs/resume.pdf
  compile_pdf: true            # set false to skip pdflatex/tectonic step
  auto_compile_after_edit: false  # in shell: recompile PDF after each Claude edit
  font: "Latin Modern"         # mostly cosmetic, used in template
